<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ITB-Ganesha AR View</title>
    <meta name="description" content="Custom Stellarium Resources by Raihan Mohammad">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- Tambahkan library AR.js di sini -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script>
      AFRAME.registerComponent('zoom-on-wheel', {
        schema: {
          min: {type: 'number', default: 20},
          max: {type: 'number', default: 120}
        },
        init: function () {
          var self = this;
          window.addEventListener('wheel', function (event) {
            var cam = self.el.getAttribute('camera');
            var fov = cam.fov;
            fov += event.deltaY * 0.05;
            fov = Math.min(Math.max(fov, self.data.min), self.data.max);
            self.el.setAttribute('camera', 'fov', fov);
          });
        }
      });
    </script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <!-- Tambahkan 'embedded' dan 'arjs' pada scene -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" loading-screen="dotsColor: white; backgroundColor: black">
      
      <a-assets>
        <img id="sky-ITB" src="itb_equirectangular (2).jpg" crossorigin="anonymous">
      </a-assets>

      <!-- Tambahkan transparansi (opacity) agar kamera tembus pandang -->
      <a-sky src="#sky-ITB" 
             rotation="0 180 0" 
             material="transparent: true; opacity: 0.8;"
             animation="property: rotation; to: 0 540 0; loop: true; dur: 200000; easing: linear">
      </a-sky>

      <!-- Pastikan ada entity camera -->
      <a-entity camera="fov: 60" look-controls zoom-on-wheel="min: 20; max: 120"></a-entity>
        
    </a-scene>

  </body>
</html>
