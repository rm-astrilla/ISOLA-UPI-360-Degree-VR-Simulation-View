<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ITB-Ganesha 360 degree VR view</title>
    <meta name="description" content="Custom Stellarium Resources by Raihan Mohammad">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      
      AFRAME.registerComponent('zoom-on-wheel', {
        schema: {
          min: {type: 'number', default: 20},
          max: {type: 'number', default: 150}
        },
        init: function () {
          var self = this;
          window.addEventListener('wheel', function (event) {
            var cam = self.el.getAttribute('camera');
            var fov = cam.fov;

            // deltaY positif = scroll ke bawah (zoom out)
            // deltaY negatif = scroll ke atas (zoom in)
            fov += event.deltaY * 0.05;

            // Batasi agar zoom tidak terlalu jauh atau terlalu dekat
            fov = Math.min(Math.max(fov, self.data.min), self.data.max);

            self.el.setAttribute('camera', 'fov', fov);
          });
        }
      });
    </script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>

    <a-scene loading-screen="dotsColor: white; backgroundColor: black">
      
      <a-assets>
        <img id="sky-ITB" src="itb_equirectangular.jpg" crossorigin="anonymous">
      </a-assets>

      <a-sky src="#sky-ITB" 
             rotation="0 180 0" 
             animation="property: rotation; to: 0 540 0; loop: true; dur: 200000; easing: linear">
      </a-sky>

      <a-entity camera="fov: 60" look-controls="magicWindowTrackingEnabled: false; touchEnabled: true; mouseEnabled: true"   zoom-on-wheel position="0 1.6 0">
        
</a-entity>

    </a-scene>

  </body>
</html>
